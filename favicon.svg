<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1625"/>
      <stop offset="100%" style="stop-color:#2d1b4e"/>
    </linearGradient>
    <linearGradient id="arc1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c084fc"/>
      <stop offset="100%" style="stop-color:#e879f9"/>
    </linearGradient>
    <linearGradient id="arc2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a855f7"/>
      <stop offset="100%" style="stop-color:#c084fc"/>
    </linearGradient>
    <linearGradient id="arc3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
  </defs>

  <!-- 배경 원 -->
  <circle cx="16" cy="16" r="15" fill="url(#bg)"/>

  <!-- 궤도 호 3개 (버스/우주 느낌) -->
  <!-- 바깥 호 -->
  <path d="M 5 16 A 11 11 0 0 1 27 16" fill="none" stroke="url(#arc1)" stroke-width="1.8" stroke-linecap="round" opacity="0.9"/>
  <!-- 중간 호 -->
  <path d="M 7 16 A 9 9 0 0 1 25 16" fill="none" stroke="url(#arc2)" stroke-width="1.8" stroke-linecap="round" opacity="0.75"/>
  <!-- 안쪽 호 -->
  <path d="M 9 16 A 7 7 0 0 1 23 16" fill="none" stroke="url(#arc3)" stroke-width="1.8" stroke-linecap="round" opacity="0.6"/>

  <!-- 중앙 R 텍스트 -->
  <text x="16" y="21" font-family="Georgia, serif" font-size="13" font-weight="700" fill="#f0ecff" text-anchor="middle" letter-spacing="-0.5">R</text>

  <!-- 우상단 반짝이는 점 -->
  <circle cx="24" cy="8" r="1.5" fill="#e879f9" opacity="0.9"/>
  <circle cx="27" cy="11" r="0.8" fill="#c084fc" opacity="0.6"/>
</svg>
