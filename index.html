// 순위 자동 부여
const tierOrder = ['S','A','B','C','N','기타'];
const tierMap = {S:'S티어', A:'A티어', B:'B티어', C:'C티어', N:'네이버 카페/블로그', '기타':'모음/기타'};
let ranked = [];
let r = 1;
tierOrder.forEach(t => {
  data.filter(d => d.tier === t).forEach(d => {
    ranked.push({...d, rank: t === 'N' || t === '기타' ? '-' : r++});
  });
});

document.getElementById('fcnt-all').textContent = '(' + data.length + ')';
['S','A','B','C','N','기타'].forEach(t => {
  const el = document.getElementById('fcnt-' + t);
  if (el) el.textContent = '(' + data.filter(d => d.tier === t).length + ')';
});

let activeTier = '';
function setTier(t) {
  activeTier = t;
  document.querySelectorAll('.fbtn').forEach(b => {
    b.className = 'fbtn';
    const id = b.id.replace('btn-','');
    if ((id === 'all' && t === '') || id === t) {
      b.classList.add(t === '' ? 'on-all' : 'on-' + t);
    }
  });
  render();
}
function render() {
  const kw = document.getElementById('kw').value.trim().toLowerCase();
  const filtered = ranked.filter(d => {
    const matchTier = !activeTier || d.tier === activeTier;
    const matchKw = !kw || d.name.toLowerCase().includes(kw) || d.desc.toLowerCase().includes(kw);
    return matchTier && matchKw;
  });
  document.getElementById('count').textContent = `총 ${filtered.length}개 사이트`;
  const tbody = document.getElementById('tbody');
  if (!filtered.length) {
    tbody.innerHTML = '<tr><td colspan="5" class="empty">검색 결과가 없습니다.</td></tr>';
    return;
  }
  tbody.innerHTML = filtered.map(d => `
    <tr>
      <td class="rank">${d.rank}</td>
      <td><span class="tier-badge badge-${d.tier}">${tierMap[d.tier]}</span></td>
      <td class="site-name">${d.name}</td>
      <td class="site-desc">${d.desc}</td>
      <td>${d.url ? `<a class="site-link" href="${d.url}" target="_blank" rel="noopener">바로가기 →</a>` : '<span class="no-url">링크 미확인</span>'}</td>
    </tr>`).join('');
}
